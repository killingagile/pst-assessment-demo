<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pioneer · Settler · Town Planner — Equal Experts</title>
  <meta name="description" content="A self-evaluation exercise to understand how you naturally approach work. 10 questions, ~3 minutes." />

  <!-- EE Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2322567C'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='%231795D4'>◈</text></svg>" />

  <!-- Lexend font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React + Babel (no build step) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Lexend', sans-serif; background: #F5F5F5; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100%; }
    @keyframes growBar { from { width: 0; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const QUESTIONS = [
      {
        id: 1,
        prompt: "You are starting work on something new and the path forward is unclear. What feels most natural?",
        answers: [
          { text: "Explore different ideas quickly and see what emerges.", type: "pioneer" },
          { text: "Work out how to turn the early thinking into something practical.", type: "settler" },
          { text: "Define structure, constraints, and guardrails early.", type: "town_planner" },
        ],
      },
      {
        id: 2,
        prompt: "You inherit a rough but promising prototype. What is your first instinct?",
        answers: [
          { text: "Strengthen it so it can be used reliably.", type: "settler" },
          { text: "Push the idea further and test what else might be possible.", type: "pioneer" },
          { text: "Introduce standards and consistency.", type: "town_planner" },
        ],
      },
      {
        id: 3,
        prompt: "A team is stuck using an old system that mostly works but has many flaws. What are you most likely to do?",
        answers: [
          { text: "Standardise it and reduce variation so it can be run efficiently.", type: "town_planner" },
          { text: "Improve it step by step so it becomes more maintainable.", type: "settler" },
          { text: "Look for a fundamentally better approach.", type: "pioneer" },
        ],
      },
      {
        id: 4,
        prompt: "Which kind of work gives you the most energy?",
        answers: [
          { text: "Figuring out something that no one has solved yet.", type: "pioneer" },
          { text: "Making a proven system efficient and predictable.", type: "town_planner" },
          { text: "Turning a messy idea into something solid and workable.", type: "settler" },
        ],
      },
      {
        id: 5,
        prompt: "When there is ambiguity, your natural tendency is to:",
        answers: [
          { text: "Reduce ambiguity by shaping the work into something clearer.", type: "settler" },
          { text: "Move forward and learn through experimentation.", type: "pioneer" },
          { text: "Reduce ambiguity by introducing clearer process and rules.", type: "town_planner" },
        ],
      },
      {
        id: 6,
        prompt: "A new initiative has just been launched. Where do you naturally gravitate?",
        answers: [
          { text: "Designing how it will scale and operate consistently.", type: "town_planner" },
          { text: "Exploring bold ideas and testing new directions.", type: "pioneer" },
          { text: "Building a structured product from early ideas.", type: "settler" },
        ],
      },
      {
        id: 7,
        prompt: "A system has become stable and well understood. What happens to your interest?",
        answers: [
          { text: "I focus on efficiency and reliability improvements.", type: "town_planner" },
          { text: "I start looking for the next unexplored challenge.", type: "pioneer" },
          { text: "I improve the system further so it becomes more useful.", type: "settler" },
        ],
      },
      {
        id: 8,
        prompt: "When a team is struggling, your instinctive contribution is to:",
        answers: [
          { text: "Bring clearer structure and discipline.", type: "town_planner" },
          { text: "Challenge assumptions and introduce new thinking.", type: "pioneer" },
          { text: "Refine what exists so it works better in practice.", type: "settler" },
        ],
      },
      {
        id: 9,
        prompt: "Which statement sounds most like you?",
        answers: [
          { text: "I am at my best when making things dependable at scale.", type: "town_planner" },
          { text: "I am at my best when exploring what could be possible.", type: "pioneer" },
          { text: "I am at my best when making things real and workable.", type: "settler" },
        ],
      },
      {
        id: 10,
        prompt: "If you had to choose one role on a new initiative, which would feel most natural?",
        answers: [
          { text: "Operationalise the solution.", type: "town_planner" },
          { text: "Discover the opportunity.", type: "pioneer" },
          { text: "Shape the solution.", type: "settler" },
        ],
      },
    ];

    const PROFILES = {
      pioneer: {
        label: "Pioneer",
        color: "#F07C00",
        lightColor: "#FFF3E0",
        icon: "◈",
        tagline: "You appear most energised by ambiguity, experimentation, and discovering new possibilities.",
        description: "Pioneers thrive in the unknown. You move fast, challenge assumptions, and generate the raw material that others will build upon.",
      },
      settler: {
        label: "Settler",
        color: "#1795D4",
        lightColor: "#E3F4FC",
        icon: "◉",
        tagline: "You appear most energised by turning ideas into practical and reliable outcomes.",
        description: "Settlers bridge the gap between chaos and order. You take rough ideas and shape them into things that genuinely work.",
      },
      town_planner: {
        label: "Town Planner",
        color: "#22567C",
        lightColor: "#E8EEF3",
        icon: "◫",
        tagline: "You appear most energised by creating consistency, efficiency, and stability at scale.",
        description: "Town Planners make things run. You create the foundations and processes that allow everything else to scale reliably.",
      },
    };

    function computeScores(answers) {
      const scores = { pioneer: 0, settler: 0, town_planner: 0 };
      answers.forEach((type) => { if (type) scores[type]++; });
      return scores;
    }

    function interpretResult(scores) {
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const [top, second] = sorted;
      if (top[1] - second[1] >= 3) return { kind: "dominant", primary: top[0], secondary: null };
      if (Math.max(...Object.values(scores)) - Math.min(...Object.values(scores)) <= 2) return { kind: "balanced", primary: top[0], secondary: second[0] };
      return { kind: "blended", primary: top[0], secondary: second[0] };
    }

    function IntroScreen({ onStart }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "40px 24px", background: "#F5F5F5" }}>
          <div style={{ maxWidth: 560, width: "100%" }}>
            <div style={{ background: "#22567C", borderRadius: "16px 16px 0 0", padding: "28px 32px 24px", position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", top: 0, right: 0, width: 180, height: 180, background: "rgba(23,149,212,0.15)", borderRadius: "50%", transform: "translate(40%, -40%)" }} />
              <div style={{ position: "absolute", bottom: 0, left: "30%", width: 100, height: 100, background: "rgba(38,156,158,0.1)", borderRadius: "50%", transform: "translateY(50%)" }} />
              <div style={{ fontSize: 11, fontWeight: 400, color: "#1795D4", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>Equal Experts</div>
              <h1 style={{ color: "#FFFFFF", fontSize: 26, fontWeight: 400, lineHeight: 1.2, margin: 0 }}>Pioneer · Settler · Town Planner</h1>
              <p style={{ color: "rgba(255,255,255,0.65)", fontSize: 14, margin: "12px 0 0" }}>A self-evaluation exercise · 10 questions · ~3 minutes</p>
            </div>
            <div style={{ height: 4, background: "linear-gradient(90deg, #1795D4 0%, #269C9E 45%, #F07C00 100%)" }} />
            <div style={{ background: "#FFFFFF", borderRadius: "0 0 16px 16px", padding: "32px 32px 36px", boxShadow: "0 4px 24px rgba(33,37,38,0.08)" }}>
              <p style={{ color: "#212526", fontSize: 14, lineHeight: 1.6, margin: "0 0 20px" }}>
                This short exercise is designed to understand how you naturally approach work.
              </p>
              <p style={{ color: "#212526", fontSize: 14, lineHeight: 1.6, margin: "0 0 28px" }}>
                For each question, choose the response that best reflects your <strong>instinctive behaviour</strong> — not what you think sounds best or what your current role expects of you. There are no right or wrong answers.
              </p>
              <div style={{ display: "flex", gap: 8, marginBottom: 32, flexWrap: "wrap" }}>
                {Object.entries(PROFILES).map(([key, p]) => (
                  <div key={key} style={{ display: "flex", alignItems: "center", gap: 8, background: p.lightColor, borderRadius: 100, padding: "6px 14px" }}>
                    <span style={{ color: p.color, fontSize: 16 }}>{p.icon}</span>
                    <span style={{ color: p.color, fontSize: 12, fontWeight: 500 }}>{p.label}</span>
                  </div>
                ))}
              </div>
              <button
                onClick={onStart}
                style={{ width: "100%", background: "#1795D4", color: "#FFFFFF", border: "none", borderRadius: 10, padding: "15px 24px", fontSize: 15, fontWeight: 500, fontFamily: "'Lexend', sans-serif", cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.background = "#1280bb"}
                onMouseLeave={e => e.currentTarget.style.background = "#1795D4"}
              >
                Begin the assessment →
              </button>
            </div>
          </div>
        </div>
      );
    }

    function QuestionScreen({ question, index, total, selected, onSelect, onNext, onBack }) {
      const progress = (index / total) * 100;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "40px 24px", background: "#F5F5F5" }}>
          <div style={{ maxWidth: 560, width: "100%" }}>
            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 11, color: "#1795D4", letterSpacing: "0.1em", textTransform: "uppercase" }}>Question {index + 1} of {total}</span>
                <span style={{ fontSize: 11, color: "#22567C", letterSpacing: "0.08em" }}>{Math.round(progress)}% complete</span>
              </div>
              <div style={{ height: 3, background: "#E0E0E0", borderRadius: 2, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg, #1795D4, #269C9E)", borderRadius: 2, transition: "width 0.4s ease" }} />
              </div>
            </div>

            <div style={{ background: "#FFFFFF", borderRadius: 16, padding: "36px 32px", boxShadow: "0 4px 24px rgba(33,37,38,0.08)" }}>
              <p style={{ color: "#22567C", fontSize: 17, fontWeight: 400, lineHeight: 1.4, margin: "0 0 28px" }}>{question.prompt}</p>

              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {question.answers.map((ans, i) => {
                  const isSelected = selected === ans.type;
                  const letter = ["A", "B", "C"][i];
                  return (
                    <button
                      key={i}
                      onClick={() => onSelect(ans.type)}
                      style={{
                        display: "flex", alignItems: "flex-start", gap: 14,
                        background: isSelected ? "#E3F4FC" : "#F5F5F5",
                        border: isSelected ? "2px solid #1795D4" : "2px solid transparent",
                        borderRadius: 10, padding: "14px 16px", cursor: "pointer",
                        textAlign: "left", transition: "all 0.15s", fontFamily: "'Lexend', sans-serif",
                      }}
                      onMouseEnter={e => { if (!isSelected) e.currentTarget.style.background = "#EEF8FD"; }}
                      onMouseLeave={e => { if (!isSelected) e.currentTarget.style.background = "#F5F5F5"; }}
                    >
                      <span style={{
                        minWidth: 26, height: 26, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center",
                        background: isSelected ? "#1795D4" : "#FFFFFF", color: isSelected ? "#FFFFFF" : "#22567C",
                        fontSize: 12, fontWeight: 600, border: isSelected ? "none" : "1.5px solid #C0D4DF", flexShrink: 0, marginTop: 1,
                      }}>{letter}</span>
                      <span style={{ fontSize: 14, color: "#212526", lineHeight: 1.5 }}>{ans.text}</span>
                    </button>
                  );
                })}
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28, gap: 12 }}>
                {index > 0 ? (
                  <button onClick={onBack} style={{ background: "none", border: "1.5px solid #C0D4DF", borderRadius: 8, padding: "10px 20px", fontSize: 13, color: "#22567C", fontFamily: "'Lexend', sans-serif", cursor: "pointer" }}>← Back</button>
                ) : <div />}
                <button
                  onClick={onNext}
                  disabled={!selected}
                  style={{
                    background: selected ? "#1795D4" : "#C0D4DF", color: "#FFFFFF", border: "none",
                    borderRadius: 8, padding: "10px 24px", fontSize: 13, fontWeight: 500,
                    fontFamily: "'Lexend', sans-serif", cursor: selected ? "pointer" : "not-allowed", transition: "background 0.15s",
                  }}
                >
                  {index === total - 1 ? "See my results →" : "Next →"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ResultBar({ label, score, total, color, icon, delay }) {
      const pct = (score / total) * 100;
      return (
        <div style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ color, fontSize: 16 }}>{icon}</span>
              <span style={{ fontSize: 14, color: "#22567C", fontWeight: 500 }}>{label}</span>
            </div>
            <span style={{ fontSize: 13, color: "#212526", fontWeight: 500 }}>{score}/{total}</span>
          </div>
          <div style={{ height: 10, background: "#F0F0F0", borderRadius: 5, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 5, animation: `growBar 0.7s ${delay}s ease-out both` }} />
          </div>
        </div>
      );
    }

    function ResultScreen({ scores, interpretation, onRetake }) {
      const top = PROFILES[interpretation.primary];
      const second = interpretation.secondary ? PROFILES[interpretation.secondary] : null;

      let headlineText = "";
      if (interpretation.kind === "dominant") headlineText = `Strong ${top.label} preference`;
      else if (interpretation.kind === "blended") headlineText = `Blended ${top.label}–${second.label} profile`;
      else headlineText = "Relatively balanced profile";

      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "40px 24px", background: "#F5F5F5" }}>
          <div style={{ maxWidth: 560, width: "100%", animation: "fadeUp 0.5s ease-out both" }}>
            <div style={{ background: "#22567C", borderRadius: "16px 16px 0 0", padding: "28px 32px 24px" }}>
              <div style={{ fontSize: 11, color: "#1795D4", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10 }}>Your profile</div>
              <h2 style={{ color: "#FFFFFF", fontSize: 22, fontWeight: 400, margin: "0 0 6px" }}>{headlineText}</h2>
              <p style={{ color: "rgba(255,255,255,0.7)", fontSize: 13, margin: 0 }}>{top.tagline}</p>
            </div>
            <div style={{ height: 4, background: "linear-gradient(90deg, #1795D4 0%, #269C9E 45%, #F07C00 100%)" }} />

            <div style={{ background: "#FFFFFF", borderRadius: "0 0 16px 16px", padding: "32px 32px 36px", boxShadow: "0 4px 24px rgba(33,37,38,0.08)" }}>
              {Object.entries(PROFILES).map(([key, p], i) => (
                <ResultBar key={key} label={p.label} score={scores[key]} total={10} color={p.color} icon={p.icon} delay={i * 0.12} />
              ))}

              <div style={{ background: top.lightColor, borderLeft: `3px solid ${top.color}`, borderRadius: "0 8px 8px 0", padding: "14px 16px", margin: "24px 0" }}>
                <p style={{ color: "#212526", fontSize: 13.5, lineHeight: 1.6, margin: 0 }}>{top.description}</p>
              </div>

              <p style={{ color: "#767676", fontSize: 12, lineHeight: 1.5, margin: "0 0 24px", borderTop: "1px solid #EEEEEE", paddingTop: 20 }}>
                This is not a personality test. It reflects the patterns suggested by your answers and is intended to prompt useful discussion.
              </p>

              <button
                onClick={onRetake}
                style={{ width: "100%", background: "none", border: "1.5px solid #1795D4", color: "#1795D4", borderRadius: 10, padding: "13px 24px", fontSize: 14, fontWeight: 500, fontFamily: "'Lexend', sans-serif", cursor: "pointer" }}
                onMouseEnter={e => { e.currentTarget.style.background = "#E3F4FC"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "none"; }}
              >
                Retake assessment
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [phase, setPhase] = useState("intro");
      const [currentQ, setCurrentQ] = useState(0);
      const [answers, setAnswers] = useState(Array(10).fill(null));

      const handleSelect = (type) => {
        const next = [...answers];
        next[currentQ] = type;
        setAnswers(next);
      };

      const handleNext = () => {
        if (currentQ < QUESTIONS.length - 1) setCurrentQ(currentQ + 1);
        else setPhase("result");
      };

      const handleBack = () => {
        if (currentQ > 0) setCurrentQ(currentQ - 1);
      };

      const handleRetake = () => {
        setAnswers(Array(10).fill(null));
        setCurrentQ(0);
        setPhase("intro");
      };

      if (phase === "intro") return <IntroScreen onStart={() => setPhase("question")} />;
      if (phase === "result") {
        const scores = computeScores(answers);
        const interpretation = interpretResult(scores);
        return <ResultScreen scores={scores} interpretation={interpretation} onRetake={handleRetake} />;
      }

      return (
        <QuestionScreen
          question={QUESTIONS[currentQ]}
          index={currentQ}
          total={QUESTIONS.length}
          selected={answers[currentQ]}
          onSelect={handleSelect}
          onNext={handleNext}
          onBack={handleBack}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
